<!DOCTYPE html>
<html lang="{{language}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}} — {{subject}}</title>
  <link rel="stylesheet" href="{{root}}style.css" />
</head>
<body data-capsule="{{capsule_id}}">
  <header class="topbar">
    <a class="home" href="{{root}}index.html">teach-me</a>
    <span class="crumb">{{subject}} · {{title}}</span>
  </header>
  <main>
    <h1>{{title}}</h1>

    <!-- Fill this page following references/capsule-blueprint.md.
         Replace the content below; keep it active (examples, recall) per references/pedagogy.md. -->
    {{content}}

    <p style="margin-top:2rem"><button data-complete="{{relpath}}">Mark this section complete</button></p>
    <footer>{{subject}} · {{level}} · {{capsule_id}}</footer>
  </main>
  <script src="{{root}}app.js"></script>
</body>
</html>
