name: "📦 New artifact"
description: Suggest a new prompt, agent, skill, MCP server, or eval.
title: "[artifact]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Prompt
        - Agent
        - Skill
        - MCP server
        - Eval
        - Example
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this artifact solve?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details / draft
      description: Draft of the artifact, links, or references.
    validations:
      required: false
