name: "🐞 Issue with an artifact"
description: Report that an artifact does not work as described.
title: "[bug]: "
labels: ["bug"]
body:
  - type: input
    id: artifact
    attributes:
      label: Artifact
      description: Path of the artifact (e.g., prompts/code-review.md)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. observed behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Model/runtime, version, steps to reproduce.
    validations:
      required: false
